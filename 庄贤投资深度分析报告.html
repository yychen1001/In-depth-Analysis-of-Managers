**研究对象**：杭州庄贤投资管理合伙企业（有限合伙）  
**研究范围**：公开数据资料  
**数据截止**：2026年4月30日  

---

## 投资摘要

**庄贤大周期策略 = 化工产业认知 + 供需拐点识别 + 个股利润兑现 + 交易纪律约束。**

| 图文摘要 | 核心提炼 |
|---|---|
| **能力来源** | 化工产业链认知、实体产业网络与买方研究方法共同构成策略基础。 |
| **收益机制** | 从价格、库存、事件和产能变化中识别供需错配，再映射到个股利润兑现。 |
| **业绩特征** | 长期收益弹性较强，但收益分布具有状态依赖，历史最大回撤较深。 |
| **配置定位** | 适合作为周期弹性资产，配置比例应随环境适配度和风险预算动态调整。 |

**核心结论：庄贤更适合作为权益组合中的周期/资源/化工专项增强模块，而非核心权益底仓或低波绝对收益替代。**

庄贤投资是一家以化工及泛周期产业研究为主要能力基础的主观股票管理人。其“大周期”策略并非传统意义上的周期股 Beta 配置，而是以供需变化为统一分析框架，在化工、有色、贵金属、农产品、新材料及部分出海产能方向中，寻找价格、库存、产能、成本与利润预期之间的错配机会。

从配置视角看，庄贤的价值在于提供与消费、医药、TMT 等主流成长风格不同的收益来源。**其优势集中在化工产业链认知、细分品种供需跟踪、事件响应和个股兑现判断，较适合在供给冲击、需求爆发、供需紧平衡、资源重估及政策推动出清的环境中发挥作用。**

同时，庄贤不是低波动、全天候或全市场均衡型管理人。锐进2号作为运行时间最长的代表产品，自2018年以来年化收益24.39%，最大回撤-33.13%，回撤区间为2021年12月至2024年2月，回撤时长26个月、修复耗时19个月。该业绩特征说明，其长期收益具有较强弹性，但净值体验高度依赖周期、资源和化工方向的市场环境。

**更进一步看，2022-2023年连续亏损并不只是单一年份的投资失误，而是对策略底层假设的一次压力测试：当供需改善、利润增长和股价表现之间的传导链条被资金流出、估值下移和风格偏离削弱时，产业研究优势难以完全转化为净值收益。** 因此，对庄贤的评价应同时关注其“找机会”的能力和“环境不适配时控制暴露”的能力。

综合判断，庄贤适合作为权益组合中的周期/资源/化工专项增强模块，而非核心权益底仓或绝对收益替代。配置前提是投资人认可其能力圈，接受阶段性长回撤，并持续跟踪其收益是否来自化工和泛周期供需错配，而非单一市场环境红利或风格外延漂移。

---

| 策略评价主线 | 重点观察 |
|---|---|
| **收益来源** | 供需拐点、资源重估、政策出清和个股利润兑现。 |
| **主要约束** | 周期环境依赖、阶段性深回撤、产品线底层风险相关性较高。 |
| **跟踪重点** | 价格、库存、政策、资金流向、规模容量和风控执行。 |

## 一、团队背景与核心人员

### 1.1 组织基因：实体产业背景塑造研究路径

庄贤投资成立于2016年，具备私募基金管理人资格。公司早期与实体企业投资部门渊源较深，投研体系更偏产业链和企业经营视角，而非单纯从二级市场行业分类出发。长三角化工和制造业企业资源，是其形成大周期策略的重要基础。

### 1.2 核心人员：宏观框架与化工研究互补

王安为总经理兼基金经理，清华大学金融硕士，曾任 BDA 投资咨询（老虎基金亚太研究）投资分析师、复星集团投资经理。其早期研究训练偏重基础数据核验和证伪思维，产业投资经历则强化了从企业经营视角理解资产价值的能力。2016年王安回到杭州三元集团任投资部总经理，庄贤的设立与三元控股集团投资部具有直接渊源。该履历使庄贤天然更贴近制造业、化工和周期资产，也解释了其策略长期围绕供需、成本、产能、库存和产业链景气展开。

宋哲建为基金经理，清华大学工学硕士、化学工程学士，曾任中投证券行业研究员、富国基金资深高级研究员，2020年7月加入庄贤。其优势在于化工产业链研究、技术路线、成本结构和细分品类供需判断。宋哲建的加入增强了庄贤股票策略的化工研究深度，使其研究能力不只依赖产业资源，也具备较系统的买方研究方法。

### 1.3 能力边界：核心化工圈向泛周期延伸

投研能力圈呈现明显层次：核心化工圈覆盖约100-150只化工大板块个股，典型周期圈覆盖工业、农业等周期属性标的，泛周期圈覆盖部分金融、消费等具周期属性的方向。该分层反映了庄贤的真实优势边界：化工为最高置信度，典型周期次之，泛周期更多承担补充表达功能。

因此，庄贤的竞争力来自“核心人员+产业网络+化工研究”的组合。优势是风格稳定、反应较快、能力圈清晰；局限是核心人员依赖较高，策略外延扩张需要相应研究资源承接。若未来规模继续扩大或产品线进一步外延，团队宽度和投资决策分工将成为重要观察点。

| 团队能力拆解 | 对策略的含义 |
|---|---|
| **产业背景** | 强化从企业经营、成本、产能和供需角度理解资产价值。 |
| **化工研究** | 提升细分品种、技术路线、成本结构和利润兑现判断能力。 |
| **核心人员依赖** | 风格稳定但组织弹性有限，规模扩大后需观察团队宽度。 |

## 二、产品线与业绩分析

### 2.1 产品线差异：同一框架下的不同风险预算

庄贤股票多头策略主要形成锐进、锐远、锐途三类产品线。三者共享同一套大周期供需研究框架，但在组合约束、工具使用、个股弹性和目标客户风险偏好上存在差异。

锐进系列更接近庄贤股票策略的基础版本，围绕A股典型周期股供需错配进行布局，强调景气度拐点、持仓均衡和风险收益平衡。该系列运行时间最长，更适合作为观察庄贤核心策略穿越不同市场环境能力的样本。

锐远系列定位更进取，弹性和集中度更高，且可通过收益互换等工具参与部分港股非通标的。其收益弹性显著强于锐进，但波动水平也更高，更适合风险预算较高、希望增强周期成长弹性的资金。

锐途系列定位更保守，主要通过较低仓位、低估值标的和更严格仓位约束降低净值波动。该系列适合希望参与庄贤供需框架、但对回撤更敏感的资金。不过，锐途并不改变底层资产属性，其波动降低更多来自仓位控制，而非策略相关性显著下降。

**因此，三条产品线的差异并非“策略不同”，而是同一策略在不同风险预算下的表达。机构配置时应先确定希望承担的周期/资源/化工风险敞口，再选择对应产品线，而不是将三者简单视为分散化组合。**

### 2.4 业绩特征解读

锐进2号是观察庄贤核心策略最重要的样本。2019-2021年连续取得较高收益，对应化工、资源和新能源上游等方向供需机会较多；2022-2023年连续回撤，反映出在周期承压、资金环境转弱和市场风格不利阶段，策略难以完全规避方向性风险；2025年显著修复，与资源品上行、反内卷预期、供需出清交易相匹配。

**锐进2号最大回撤-33.13%，且回撤周期较长，是评价庄贤时必须重视的约束。该产品体现的并不是低波绝对收益特征，而是“较高长期收益+阶段性深回撤”的周期增强特征。** 其风险收益形态决定了投资人需要具备较长持有周期和较高回撤容忍度。

锐远1号收益弹性明显高于锐进2号，2024年和2025年分别取得38.71%和83.41%的收益。其差异部分来自更高弹性品种、较高集中度，以及通过收益互换参与部分港股非通标的。该产品更适合风险预算较高、希望增强进攻性的资金，但其年化波动27.44%，说明高收益对应更高风险暴露。

锐途1号通过低仓位和低估值标的选择降低组合波动，2025年收益28.94%，但2026年1-4月收益仅4.07%，最大回撤-9.24%且截至数据日尚未修复。该产品可以作为参与庄贤框架的保守表达，但并不改变底层策略对周期和资源环境的敏感性，也不宜被理解为低相关或纯绝对收益策略。

整体看，三条产品线是同一策略框架下的不同风险预算表达，而非三种独立策略。配置锐进、锐远、锐途，本质是选择不同进攻性和回撤容忍度，而不是获得底层风险来源的显著分散。

| 产品选择逻辑 | 锐进2号 | 锐远1号 | 锐途1号 |
|---|---|---|---|
| **组合角色** | 核心策略观察样本 | 进攻弹性表达 | 低仓位保守表达 |
| **主要差异** | 运行时间最长、均衡周期 | 集中度和工具弹性更高 | 通过仓位降低波动 |
| **配置含义** | 适合评估穿越能力 | 适合较高风险预算 | 适合回撤敏感资金 |

**组合业绩的进一步解读**

锐进2号的年度收益分布具有较强的“状态依赖”特征。2019-2021年连续正收益和2025年高收益，反映出策略在供需拐点密集、周期品价格弹性较强、市场愿意定价资源和上游利润时具备较强进攻性；2022-2023年连续亏损，则说明当宏观流动性、风险偏好和市场风格共同不利时，供需框架并不能天然抵消方向性 Beta。

**这组数据对配置人的启示在于，庄贤的收益并非均匀分布，而是明显集中于少数有利年份。该特征本身并不否定策略价值，但要求配置人在仓位安排上避免“高点追认”。** 如果在2021年末或周期叙事充分定价后进入，投资者可能经历较长回撤；如果在周期低位、供需出清和政策拐点逐步显性化阶段配置，则更可能捕捉其策略弹性。

**2024年收益仅4.16%、2025年大幅回升，也提供了一个重要观察：低估值本身并不足以驱动庄贤策略释放收益，真正有效的催化往往来自价格信号、库存出清、政策推动或资源品重估等变量。** 换言之，庄贤不是单纯的“低估值周期股买入持有”管理人，而是更依赖供需变化从潜在逻辑走向可交易信号。

锐远与锐途的表现进一步说明，庄贤可以通过工具、集中度和仓位改变净值弹性，但难以改变底层收益来源。锐远放大的是同一框架下的上行弹性，锐途压低的是同一框架下的波动水平。对于机构组合而言，这意味着产品选择应服务于风险预算，而不能把不同产品线误认为低相关配置。

## 三、投资框架与实践案例

### 3.1 框架总览：供需变化到股价兑现

庄贤的投资框架以供需为核心，结合价格、库存、事件和个股兑现能力形成闭环。其核心问题不是简单判断“周期是否向上”，而是判断某一细分品种的供需曲线是否发生足以改变价格和利润预期的变化，以及该变化能否传导到上市公司业绩和股价。

| 投资框架链条 | 关键问题 | 风险点 |
|---|---|---|
| **供需变化** | 价格、库存、产能或事件是否改变供需曲线。 | 信号反复或变化不足以影响利润。 |
| **个股映射** | 上市公司是否具备可售产能、成本优势和利润弹性。 | 商品涨价无法充分兑现到业绩。 |
| **股价兑现** | 利润变化是否被市场定价，估值是否仍有空间。 | 流动性和风格因素打断传导链条。 |

### 3.2 研究流程：价格、事件、库存与拐点

**价格跟踪：关注二阶变量。** 庄贤对各行业周度数据进行跟踪，尤其关注价格涨跌幅变化速率。价格上涨本身并不一定构成买入信号，价格上涨速度加快、下跌速度收敛或由弱转强，才更可能提示供需关系出现边际变化。

**事件分析：识别供需曲线移动。** 国内外政策、突发事故、海外装置停产、贸易摩擦、反倾销和地缘冲突等因素，只有在实质改变供给或需求曲线时才构成投资机会。例如响水化工事件影响分散染料供给，海外装置停产影响TMA供给，俄乌冲突影响钾肥及维生素供需预期。

**库存和生产验证：用产业数据证明或证伪。** 相比价格数据，库存、开工率和生产数据更难获取且连续性不足。庄贤通过公开网站、产业链一线交易数据、草根调研、上下游供应商和经销商信息进行交叉验证。该环节体现了实体企业背景和产业资源的价值，也是其相对一般二级市场研究的主要壁垒。

**拐点判断：区分机会性质。** 周期机会可分为需求爆发、供给端意外大幅减少、供需紧平衡、供需弱平衡。需求爆发和供需紧平衡通常对应较长持有周期；供给冲击更强调快速反应和及时退出；供需弱平衡更多是库存和价格短期波动下的交易性机会。

**标的研究：从商品涨价到利润兑现。** 庄贤并不只判断商品涨价，还比较上市公司是否具备可售产能、成本是否稳定、价格上涨能否传导至利润、估值是否已充分反映、股价弹性是否匹配风险。这一点决定了其策略不是单纯商品映射，而是“品种拐点+个股兑现”的结合。

### 3.3 实践案例：能力圈有效性与边界

实践案例能够体现该框架的有效性与边界。整体看，庄贤的成功案例多发生在其能力圈较强的化工、资源和上游材料领域，且通常具备明确供需变化；失败或承压案例则多来自复工复产、流动性环境、市场风格等变量超出原有基本面假设。

**浙江龙盛：供给冲击下的快速响应和止盈纪律。** 2019年江苏响水工业园区爆炸后，分散染料供给受到冲击，价格快速上涨，相关个股成为市场关注焦点。庄贤在判断股价向下空间有限的前提下快速建仓，并在市场情绪达到高点、股价出现泡沫时分批减仓。该案例体现了其在供给冲击型机会中的优势：产业链理解、事件影响评估、快速执行和止盈纪律。该类机会通常窗口较短，对信息响应速度和退出纪律要求高，较能体现庄贤在化工产业链中的能力圈优势。

**神马股份：产业链重构带来的周期成长机会。** 2018年庄贤关注神马股份，并将其作为周期行业中寻找成长属性公司的案例。该公司通过并购重组打通上游原材料环节，改善成本结构和利润弹性，后续利润出现明显增长。该案例并非单纯商品涨价交易，而更接近“周期行业中的利润中枢抬升”逻辑，体现了庄贤在传统周期行业中寻找技术、成本、产能或产业链一体化带来的成长机会。

**TMA/正丹股份、维生素E等：小品种供需错配的弹性表达。** 策略材料中多次提到海外装置停产、供给收缩和库存低位带来的小品种机会，例如TMA海外产能关停、维生素E供需紧平衡等。此类机会通常具备三个特征：细分品类市场容量不大、供给集中度较高、单一装置或少数企业变化即可影响价格。庄贤在这类机会上的优势来自对化工细分品种的长期跟踪和产业链验证能力；局限在于交易窗口较短、价格波动较大，若买入时点或退出节奏不当，也容易转化为净值波动。

**亚邦股份：高置信度标的仍需执行风控。** 亚邦股份所在园区被责令停产检查，复工复产进度低于预期，股价持续下行。庄贤最终在个股产生30%+回撤后止损，并复盘认为，即便对标的置信度较高，一旦出现不可抗力或投资假设失效，也应执行既有风控标准。该案例说明，庄贤不仅强调研究正确，也强调错误情境下的退出机制。

**2023年广信股份及相关复盘：基本面到股价传导可能断裂。** 2023年市场资金持续净流出，庄贤复盘认为此前对净流出市场不够敬畏，业绩较好的公司如果处于下行板块，也可能先跌估值。该复盘说明，供需和基本面框架并非在任何市场环境中都有效，交易额、资金流向和风险偏好会影响基本面向股价的传导。

**2023年整体策略承压：供需框架在弱流动性市场中的局限。** 锐进2号2023年收益为-18.24%，与管理人复盘中提到的资金净流出、估值体系下移和交易阻力上升相一致。该阶段的关键问题不在于单一标的判断，而在于基本面研究和股价表现之间的传导链条被市场流动性削弱。该经验促使庄贤后续更重视交易额、资金流向和市场环境变量，也构成评估其策略边界的重要样本。

**综合来看，庄贤投资框架的优势在于“产业供需判断+个股兑现+交易纪律”的组合；不足在于，当市场缺乏供需拐点，或股价主要由流动性和风格驱动时，框架信号会变弱，甚至出现研究判断较合理但净值承压的情况。**

## 四、策略定位与环境适配

### 4.1 策略定位：周期框架中的供需错配与成长弹性

庄贤对“大周期”的定义较宽：凡是由供给和需求曲线变化引发价格、利润和股价波动的机会，均可纳入周期投资逻辑。该定义使其投资范围不局限于煤炭、钢铁、基础化工等传统周期行业，也覆盖黄金、有色、农药、钾肥、光伏材料、新能源材料、AI上游材料及出海化工产能等方向。

其策略本质可以概括为：在周期框架中寻找供需错配和成长弹性。庄贤并不只赚取经济周期 Beta，而是希望在周期行业中寻找三类收益来源：

1. **景气 Beta**：资源品、化工品或周期板块整体上行带来的行业收益。
2. **供需错配 Alpha**：价格变化速度、库存下降、产能退出、海外停产、政策限产、反倾销、反内卷等信号尚未被市场充分定价时产生的超额收益。
3. **周期成长 Alpha**：部分企业通过技术进步、成本优势、产能扩张、并购重组、产业链一体化或出海布局，使利润中枢持续上移。

该定位与传统周期投资存在差异。传统周期投资更依赖大宗商品价格涨跌，企业利润往往呈均值回归；庄贤更强调在周期范围内寻找“变革成长”企业，即公司利润并非完全随商品价格往复波动，而是通过自身经营和产业地位提升实现中枢抬升。其“好公司＞好价格＞好行业”的排序，也体现出其不只追逐涨价品种，而是关注个股兑现质量。

### 4.2 适配环境与不利环境

庄贤更适配以下市场环境：供需矛盾显性化，如海外停产、事故、政策限产、库存低位、行业长期亏损后的出清；资源品和上游周期资产重估，如美元弱化、资源安全、大国竞争、地缘扰动带来的黄金、铜、铝、钾等方向机会；政策推动供给侧改善，如反内卷、产能自律、行业协同去库存带来的价格修复；新产业需求拉动上游材料，如新能源、光伏、AI算力、军工、医药等对化工和新材料品种的需求扩张；全球供应链重构，如中国化工企业出海产能、全球成本优势和区域供给错配。

相对不利的环境包括：市场资金持续净流出、商品价格低波动且缺乏趋势、消费或软科技风格极端占优、周期基本面改善但无法转化为股价、供需信号频繁反复导致交易成本上升。2023年的复盘已经体现出这一点：当交易额和资金流向成为定价主导因素时，基本面改善可能不足以支撑绝对收益。

| 环境类型 | 适配度 | 组合含义 |
|---|---|---|
| **供需矛盾显性化** | 高 | 可提高周期/资源/化工风险预算。 |
| **资源品重估或政策出清** | 较高 | 策略弹性更容易释放。 |
| **资金持续净流出** | 低 | 需降低收益预期并关注回撤。 |
| **非周期风格极端占优** | 低 | 相对收益和绝对收益均可能承压。 |

### 4.3 策略特征再认识

庄贤的策略可以理解为一套“信号响应型产业投资框架”。其研究工作偏左侧，长期跟踪细分品种供需、库存和成本；但组合执行并非简单长期持有，而是需要等待价格、事件、政策或库存变化形成可交易信号。该特征介于传统价值投资和趋势交易之间：研究上更重视产业基本面，交易上又必须承认周期窗口和市场情绪的重要性。

**因此，庄贤的 Alpha 更准确地说是“环境条件型 Alpha”。当供需变化能够顺利传导为价格变化、利润变化和股价重估时，管理人的产业认知和细分品种跟踪能力可以转化为超额收益；当传导链条在利润到股价环节被流动性、估值收缩或风格偏离打断时，Alpha 会明显下降，甚至被行业 Beta 覆盖。**

这一点也解释了其业绩波动特征。庄贤并不是通过高频择时平滑净值，而是通过持续在能力圈内寻找一系列供需错配机会，形成长期收益的累积。策略的关键不是每年稳定跑赢，而是在有利环境中捕捉足够大的弹性，同时在不利环境中控制回撤不损害长期复利基础。2022-2023年的连续回撤说明后者仍是需要持续观察的环节。

## 五、风险控制

### 5.1 风控框架：主动多头下的风险预算管理

庄贤风控体系覆盖整体仓位、净值回撤、个股集中度、个股止损和止盈机制，整体属于主动多头框架下的风险预算管理。

### 5.2 具体措施：仓位、回撤、个股与止盈

**整体仓位层面**，当产品净值不超过1.05时，整体仓位不得高于5成；资管产品最高仓位为80%-100%，不使用杠杆。锐途系列强调最高仓位控制在50%以下，以追求更高收益回撤比。

**净值回撤层面**，当净值回撤接近容许最大回撤值的50%时，管理人会主动降低仓位，进行冷静复盘和思考，待净值有所修复后重启。该机制体现了组合层面的风险预算管理，但从锐进2号-33.13%的最大回撤看，其功能更偏降低损失和促进复盘，而非完全阻断回撤。

**个股集中度层面**，单一个股集中度根据置信度控制在5%-20%。单个标的仓位通常按5%、10%、20%三个等级划分。该机制适用于庄贤这类细分周期股较多、单票尾部风险较高的策略。

**个股回撤层面**，任何个股净亏损接近总资产规模2%时强制止损且6个月内不得开新仓；首次开仓快速亏损超10%时预警，超20%时止损且不再开新仓。不同材料中也出现首次开仓亏损15%卖出、单一标的亏损导致总资产回撤2%卖出的表述，口径虽略有差异，但核心原则一致：通过单票亏损阈值控制肥尾风险。

**止盈机制方面**，庄贤并未使用完全量化的固定止盈线，而是基于利润、估值和目标市值进行动态评估。当股票市值接近或超过目标值时，会通过卖出部分利润、降低仓位或全部退出实现止盈。浙江龙盛案例即体现了该机制：在市场情绪高点、股价出现泡沫时分批减仓。

### 5.3 风控边界

该风控体系的优点在于纪律较清晰，能够约束个股错误和部分尾部风险；不足在于无法完全对冲行业 Beta。若化工、资源和周期资产整体下行，个股止损和仓位调整只能降低损失幅度，不能改变组合方向性暴露。此外，严格止损在高波动和快速轮动市场中可能增加交易成本，2023年复盘亦提到首次买入胜率下降带来的额外出手成本。

**因此，庄贤的风控不应被理解为市场中性或全天候策略意义上的风险隔离，而应理解为主观多头策略中较强调纪律的风险预算控制。**

---

## 六、配置价值与策略边界

### 6.1 配置价值

庄贤的配置价值主要来自三点。第一，风格差异化。相较于消费、医药、TMT 等主流权益风格，庄贤提供化工、资源和周期方向的差异化收益来源。第二，产业研究壁垒。其在化工及泛周期细分品种上具备较强产业链跟踪能力，能够在部分供需冲击中较早形成判断。第三，环境表达能力。当地缘冲突、政策出清、供应链重构、资源安全和商品价格波动增强时，策略具备较强进攻性。

### 6.2 策略边界

其策略边界同样清晰：

- **能力圈边界**：核心优势在化工和泛周期，外延至消费、医药、软科技等领域时优势不明显。
- **环境边界**：供需变化不明显、商品低波动、资金持续净流出或市场极端偏好非周期风格时，策略胜率下降。
- **规模边界**：管理人曾提及股票主观多头合理规模控制在20-30亿元区间。考虑部分化工和周期标的流动性有限，规模扩张可能削弱建仓、调仓和退出效率。
- **产品相关性边界**：锐进、锐远、锐途底层逻辑一致，产品间相关性较高，不能替代多策略组合中的真正分散。
- **收益外推边界**：2025年较高收益中包含资源品上涨、反内卷预期和供需出清交易的环境红利，后续不能简单线性外推。

### 6.3 跟踪指标

配置时应重点跟踪六项指标：收益是否主要来自化工、资源和泛周期能力圈；月度观点是否落到具体价格、库存、产能和利润兑现；管理规模是否接近或突破20-30亿元合理容量；高弹性产品是否通过集中度、港股非通标的或收益互换放大尾部风险；周期不利环境中降仓、止损和复盘是否执行充分；2025年后的收益来源是否仍具可重复性，而非主要依赖单一环境红利。

**从组合构建角度，庄贤更适合作为“周期弹性资产”而非“组合稳定器”。** 其加入组合的主要目的，是在资源品重估、供给出清、政策修复和供应链扰动阶段提升收益弹性；不宜期待其在所有市场风格中持续提供稳定绝对收益。因此，配置比例应与投资人对周期环境的判断、整体权益仓位和已有资源品暴露综合匹配。

**更审慎的使用方式是将庄贤作为条件型配置：当价格、库存、政策和资金环境至少有两到三个变量同时改善时，提高其配置权重；当市场交易额收缩、周期品价格信号减弱、持仓品种进入情绪化定价阶段时，应降低收益预期并关注回撤控制。** 这种“按环境调节风险预算”的方式，比简单依据过往收益排名配置更符合该策略特征。

---

## 七、投资总结

### 7.1 综合判断

庄贤投资是一家风格清晰、能力边界明确的特色型主观股票管理人。其核心竞争力不在于“大周期”概念本身，而在于将化工产业链认知、供需数据验证、价格信号跟踪、事件响应和个股兑现判断结合起来。在供需扰动频繁、资源品重估、政策推动出清和供应链重构的环境中，庄贤具备较强进攻能力。

同时，庄贤并非低波动、全天候或全市场均衡型管理人。锐进2号长期年化收益较高，但最大回撤和修复耗时均显示出策略在不利环境下的方向性风险。锐远和锐途分别通过提高弹性和降低仓位形成不同产品体验，但未改变底层风险来源。机构投资者配置庄贤的关键，不是简单评价历史业绩是否亮眼，而是判断其收益来源是否与当前及未来一段时间的市场环境相匹配。

**从组合配置角度，庄贤更适合作为周期/资源/化工方向的主动增强模块。适配资金应具备三项前提：能够接受阶段性较长回撤；认可供需错配和资源重估的中期配置价值；愿意将其作为组合中的专项风险预算，而非替代核心权益或绝对收益底仓。**

### 7.2 结论

**综合而言，庄贤具备鲜明配置价值，但应以清晰的风险预算和环境判断为前提。** 其优势在于产业链深度和供需错配捕捉能力，局限在于周期环境依赖、能力圈集中和产品底层暴露相关性较高。若作为组合中的特色增强策略使用，庄贤具备研究和配置价值；若投资目标是低回撤、均衡风格或全天候收益，则应谨慎控制配置比例。

function renderMarkdown(markdown){const lines=markdown.split(/\r?\n/),html=[];let i=0;while(i<lines.length){const line=lines[i];if(!line.trim()){i++;continue}if(/^---+$/.test(line.trim())){html.push("<hr>");i++;continue}if(/^\|.*\|$/.test(line.trim())){const tableLines=[];while(i<lines.length&&/^\|.*\|$/.test(lines[i].trim())){tableLines.push(lines[i].trim());i++}html.push(renderTable(tableLines));continue}const heading=/^(#{1,3})\s+(.+)$/.exec(line);if(heading){const level=heading[1].length,text=inline(heading[2]),id=slugify(stripHtml(text));html.push("<h"+level+" id=\""+id+"\">"+text+"</h"+level+">");i++;continue}if(/^[-*]\s+/.test(line.trim())){const items=[];while(i<lines.length&&/^[-*]\s+/.test(lines[i].trim())){items.push("<li>"+inline(lines[i].trim().replace(/^[-*]\s+/,""))+"</li>");i++}html.push("<ul>"+items.join("")+"</ul>");continue}if(/^\d+\.\s+/.test(line.trim())){const items=[];while(i<lines.length&&/^\d+\.\s+/.test(lines[i].trim())){items.push("<li>"+inline(lines[i].trim().replace(/^\d+\.\s+/,""))+"</li>");i++}html.push("<ol>"+items.join("")+"</ol>");continue}const para=[line.trim()];i++;while(i<lines.length&&lines[i].trim()&&!/^(#{1,3})\s+/.test(lines[i])&&!/^---+$/.test(lines[i].trim())&&!/^\|.*\|$/.test(lines[i].trim())&&!/^[-*]\s+/.test(lines[i].trim())&&!/^\d+\.\s+/.test(lines[i].trim())){para.push(lines[i].trim());i++}html.push("<p>"+inline(para.join(" "))+"</p>")}return html.join("\n")}
